<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Real-time Weather Information</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="weather-app">
            <div class="search-section">
                <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                    <button id="locationBtn" title="Use my location"><i class="fas fa-location-crosshairs"></i></button>
                </div>
                <div id="recentSearches" class="recent-searches"></div>
            </div>

            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading weather data...</p>
            </div>

            <div id="error" class="error hidden">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorMessage"></p>
            </div>

            <div id="weatherData" class="weather-data hidden">
                <div class="current-weather">
                    <div class="location-info">
                        <h2 id="cityName"></h2>
                        <p id="date"></p>
                    </div>
                    
                    <div class="weather-main">
                        <div class="temperature-section">
                            <img id="weatherIcon" src="" alt="Weather icon">
                            <div class="temp-info">
                                <h1 id="temperature"></h1>
                                <p id="weatherDescription"></p>
                            </div>
                        </div>
                        
                        <div class="weather-details">
                            <div class="detail-item">
                                <i class="fas fa-temperature-three-quarters"></i>
                                <div>
                                    <p class="detail-label">Feels Like</p>
                                    <p id="feelsLike" class="detail-value"></p>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-droplet"></i>
                                <div>
                                    <p class="detail-label">Humidity</p>
                                    <p id="humidity" class="detail-value"></p>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-wind"></i>
                                <div>
                                    <p class="detail-label">Wind Speed</p>
                                    <p id="windSpeed" class="detail-value"></p>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-gauge"></i>
                                <div>
                                    <p class="detail-label">Pressure</p>
                                    <p id="pressure" class="detail-value"></p>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-eye"></i>
                                <div>
                                    <p class="detail-label">Visibility</p>
                                    <p id="visibility" class="detail-value"></p>
                                </div>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-sun"></i>
                                <div>
                                    <p class="detail-label">UV Index</p>
                                    <p id="uvIndex" class="detail-value"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h3><i class="fas fa-calendar-days"></i> 5-Day Forecast</h3>
                    <div id="forecast" class="forecast-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
